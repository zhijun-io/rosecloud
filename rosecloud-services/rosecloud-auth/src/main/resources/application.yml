spring:
  config:
    import:
      - optional:nacos:rosecloud-common.yaml
  application:
    name: rosecloud-auth
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      discovery:
        metadata:
          rosecloud.gateway.path: /api/v1/auth/**

server:
  port: 9120

management:
  endpoints:
    web:
      exposure:
        include: health,info

rosecloud:
  jwt:
    secret: ${ROSECLOUD_JWT_SECRET:}
    issuer: ${ROSECLOUD_JWT_ISSUER:rosecloud}
