spring:
  config:
    import:
      - optional:nacos:rosecloud-common.yaml
  application:
    name: rosecloud-gateway
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

server:
  port: 9110

management:
  endpoints:
    web:
      exposure:
        include: health,info

rosecloud:
  jwt:
    secret: ${ROSECLOUD_JWT_SECRET:}
    issuer: ${ROSECLOUD_JWT_ISSUER:rosecloud}
  gateway:
    security:
      white-list:
        - /api/v1/auth/login
        - /api/v1/auth/refresh
        - /actuator/**
