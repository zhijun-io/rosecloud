x-app-env: &app-env
  # 服务在 Docker 网络内连接基础设施（容器名），覆盖 Nacos 共享配置里的 127.0.0.1 默认值
  MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-rosecloud}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:-rosecloud123}
  NACOS_SERVER_ADDR: nacos:8848
  ROSECLOUD_JWT_SECRET: ${ROSECLOUD_JWT_SECRET:-rosecloud-dev-secret-please-change-me-0123456789}
  ROSECLOUD_TOKEN_REVOCATION_TYPE: ${ROSECLOUD_TOKEN_REVOCATION_TYPE:-redis}

services:
  mysql:
    image: mysql:8.0
    container_name: rosecloud-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rosecloud123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rosecloud}
      MYSQL_USER: ${MYSQL_USER:-rosecloud}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rosecloud123}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - rosecloud-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rosecloud-redis
    restart: unless-stopped
    profiles: [microservice]  # 仅微服务模式需要Redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-rosecloud123}
    ports:
      - "6379:6379"
    volumes:
      - rosecloud-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-rosecloud123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rosecloud-rabbitmq
    restart: unless-stopped
    profiles: [microservice]  # 仅微服务模式需要RabbitMQ
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rosecloud}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rosecloud123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rosecloud-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nacos:
    image: nacos/nacos-server:v3.2.1
    container_name: rosecloud-nacos
    restart: unless-stopped
    profiles: [microservice]  # 仅微服务模式需要Nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE:-false}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-cm9zZWNsb3VkLW5hY29zLWF1dGgtdG9rZW4tZm9yLWxvY2FsLWRldg==}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-security}
    ports:
      - "8848:8848"
      - "9848:9848"
      - "38082:8080"
    volumes:
      - rosecloud-nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: rosecloud-xxl-job-admin
    restart: unless-stopped
    profiles:
      - jobs
    depends_on:
      - mysql
    environment:
      PARAMS: >-
        --server.port=8080
        --spring.datasource.url=jdbc:mysql://mysql:3306/${XXL_JOB_DATABASE:-xxl_job}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
        --spring.datasource.username=${MYSQL_USER:-rosecloud}
        --spring.datasource.password=${MYSQL_PASSWORD:-rosecloud123}
        --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:-rosecloud-xxl-job-token}
    ports:
      - "38081:8080"

  # ---------- 应用服务（Docker 运行）----------
  rosecloud-auth:
    profiles: [microservice]
    build: { context: ., dockerfile: deploy/Dockerfile.service, args: { JAR_PATH: rosecloud-services/rosecloud-auth/target/rosecloud-auth-0.1.0-SNAPSHOT-exec.jar } }
    environment: { <<: *app-env }
    depends_on: [mysql, nacos, redis]
    ports: ["9120:9120"]

  rosecloud-system:
    profiles: [microservice]
    build: { context: ., dockerfile: deploy/Dockerfile.service, args: { JAR_PATH: rosecloud-services/rosecloud-system/target/rosecloud-system-0.1.0-SNAPSHOT-exec.jar } }
    environment: { <<: *app-env }
    depends_on: [mysql, nacos, redis]
    ports: ["9130:9130"]

  rosecloud-notice:
    profiles: [microservice]
    build: { context: ., dockerfile: deploy/Dockerfile.service, args: { JAR_PATH: rosecloud-services/rosecloud-notice/target/rosecloud-notice-0.1.0-SNAPSHOT-exec.jar } }
    environment: { <<: *app-env }
    depends_on: [mysql, nacos, redis]
    ports: ["9150:9150"]

  rosecloud-gateway:
    profiles: [microservice]
    build: { context: ., dockerfile: deploy/Dockerfile.service, args: { JAR_PATH: rosecloud-services/rosecloud-gateway/target/rosecloud-gateway-0.1.0-SNAPSHOT.jar } }
    environment: { <<: *app-env }
    depends_on: [mysql, nacos, redis, rosecloud-auth, rosecloud-system, rosecloud-notice]
    ports: ["9110:9110"]

  rosecloud-monolith:
    profiles: [monolith]
    build: { context: ., dockerfile: deploy/Dockerfile.service, args: { JAR_PATH: rosecloud-monolith/target/rosecloud-monolith-0.1.0-SNAPSHOT.jar } }
    environment:
      # 单体仅依赖 MySQL，无 Nacos/Redis/RabbitMQ
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-rosecloud}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      ROSECLOUD_JWT_SECRET: ${ROSECLOUD_JWT_SECRET:-rosecloud-dev-secret-please-change-me-0123456789}
      ROSECLOUD_TOKEN_REVOCATION_TYPE: memory  # 单体用内存存储吊销令牌，无需 Redis
    depends_on: [mysql]
    ports: ["9160:9160"]

volumes:
  rosecloud-mysql-data:
  rosecloud-redis-data:
  rosecloud-rabbitmq-data:
  rosecloud-nacos-data:

