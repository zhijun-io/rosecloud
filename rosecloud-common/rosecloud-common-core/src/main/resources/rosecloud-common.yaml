# RoseCloud 共享配置 —— 由各服务和单体通过 spring.config.import 复用。
# 本文件提供通用默认值，应用自己的 application.yml 可以继续覆盖。
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: '${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/rosecloud?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}'
    username: ${MYSQL_USER:rosecloud}
    password: ${MYSQL_PASSWORD:rosecloud123}
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:rosecloud123}
    web:
      pageable:
        # 采用 Spring Data 默认的分页参数名 page/size；1 基（page=1 为第一页），
        # 与前端原有 current/size(1 基) 语义一致，前端仅改参数名 current->page。
        one-indexed-parameters: true
        default-page-size: 10
  cloud:
    openfeign:
      autoconfiguration:
        jackson:
          enabled: false
  reactor:
    context-propagation: AUTO

logging:
  pattern:
    level: '%5p [%32.32X{traceId:-}]'

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    enabled: true
    propagation:
      type: w3c
    sampling:
      probability: 1.0

rosecloud:
  audit:
    enabled: true
  tenant:
    enabled: false
    ignore-tables:
      - sys_role
      - sys_user_role
      - sys_menu
      - sys_role_menu
      - sys_audit_log
      - sys_login_log
      - sys_dict_type
      - sys_dict_data
      - sys_dept
      - auth_login_session
      - sys_setting_key
      - sys_system_setting
      - sys_user_setting
  security:
    jwt:
      secret: ${ROSECLOUD_SECURITY_JWT_SECRET:}
      issuer: ${ROSECLOUD_SECURITY_JWT_ISSUER:rosecloud}
    internal-token: ${ROSECLOUD_SECURITY_INTERNAL_API_KEY:}

# Cache specs — 借鉴 ThingsBoard CacheSpecs 模式，使 TTL 和 maxSize 可外部配置。
# 各缓存名称对应 @EntityCache.cacheName()，未显式配置的缓存使用默认值（5min / 1000）。
cache:
  specs:
    tenant:
      timeToLiveInMinutes: ${CACHE_SPECS_TENANT_TTL:30}
      maxSize: ${CACHE_SPECS_TENANT_MAX_SIZE:5000}
    user.security:
      timeToLiveInMinutes: ${CACHE_SPECS_USER_SECURITY_TTL:10}
      maxSize: ${CACHE_SPECS_USER_SECURITY_MAX_SIZE:5000}
    user.perms:
      timeToLiveInMinutes: ${CACHE_SPECS_USER_PERMS_TTL:10}
      maxSize: ${CACHE_SPECS_USER_PERMS_MAX_SIZE:10000}
    role.menuIds:
      timeToLiveInMinutes: ${CACHE_SPECS_ROLE_MENU_IDS_TTL:10}
      maxSize: ${CACHE_SPECS_ROLE_MENU_IDS_MAX_SIZE:5000}
    menu:
      timeToLiveInMinutes: ${CACHE_SPECS_MENU_TTL:60}
      maxSize: ${CACHE_SPECS_MENU_MAX_SIZE:5000}
    menu.list:
      timeToLiveInMinutes: ${CACHE_SPECS_MENU_LIST_TTL:10}
      maxSize: ${CACHE_SPECS_MENU_LIST_MAX_SIZE:5000}
    dict.data.byCode:
      timeToLiveInMinutes: ${CACHE_SPECS_DICT_DATA_TTL:60}
      maxSize: ${CACHE_SPECS_DICT_DATA_MAX_SIZE:5000}
    dict.type:
      timeToLiveInMinutes: ${CACHE_SPECS_DICT_TYPE_TTL:60}
      maxSize: ${CACHE_SPECS_DICT_TYPE_MAX_SIZE:1000}
    dept:
      timeToLiveInMinutes: ${CACHE_SPECS_DEPT_TTL:30}
      maxSize: ${CACHE_SPECS_DEPT_MAX_SIZE:5000}
    dept.list:
      timeToLiveInMinutes: ${CACHE_SPECS_DEPT_LIST_TTL:10}
      maxSize: ${CACHE_SPECS_DEPT_LIST_MAX_SIZE:5000}
