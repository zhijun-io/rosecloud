spring:
  config:
    import:
      - optional:classpath:rosecloud-common.yaml
      - optional:nacos:rosecloud-common.yaml
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml
      - optional:nacos:${spring.application.name}.yaml
  application:
    name: rosecloud-auth
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      discovery:
        metadata:
          gateway.path: /api/auth/**

server:
  port: 9090

rosecloud:
  cache:
    enabled: true
    type: redis
  security:
    auth-chain:
      enabled: true
  auth:
    login-protection:
      enabled: true
      max-attempts: 5
      lock-window: 15m
      base-lock-duration: 15m
      max-lock-duration: 24h
      ip-max-attempts: 100
      ip-window: 10m
