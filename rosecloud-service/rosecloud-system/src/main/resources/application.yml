spring:
  config:
    import:
      - optional:classpath:rosecloud-common.yaml
      - optional:nacos:rosecloud-common.yaml
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml
      - optional:nacos:${spring.application.name}.yaml
  application:
    name: rosecloud-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      config:
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      discovery:
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        metadata:
          gateway.path: /api/system/**,/api/noauth/**

server:
  port: 9110

rosecloud:
  audit:
    enabled: true
  security:
    public-paths:
      - /api/auth/**
      - /api/noauth/**
      - /api/public/**
      - /api/system/users/auth/**
      - /api/system/login-logs
      - /api/system/audit-logs
      - /api/system/notice/recipients
      - /actuator/**
      - /error

