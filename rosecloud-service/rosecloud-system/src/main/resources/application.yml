spring:
  config:
    import:
      - optional:classpath:rosecloud-common.yaml
      - optional:nacos:rosecloud-common.yaml
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml
      - optional:nacos:${spring.application.name}.yaml
  application:
    name: rosecloud-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      config:
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
      discovery:
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
        metadata:
          gateway.path: /api/users/**,/api/tenants/**,/api/depts/**,/api/roles/**,/api/menus/**,/api/dict-types/**,/api/dict-data/**,/api/audit-logs/**,/api/login-logs/**,/api/tenant-profiles/**,/api/system-settings/**,/api/user-settings/**,/api/setting-keys/**,/api/internal/**,/api/noauth/**

server:
  port: 9110

rosecloud:
  audit:
    enabled: true
  security:
    public-paths:
      - /api/auth/login
      - /api/auth/refresh
      - /api/auth/logout
      - /api/noauth/**
      - /api/public/**
      - /api/users/auth/**
      - /actuator/health/**
      - /error

