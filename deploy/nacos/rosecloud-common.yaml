# RoseCloud 共享配置 —— 在 Nacos 创建：dataId = rosecloud-common.yaml，group = DEFAULT_GROUP
# 各服务 application.yml 通过 spring.config.import: optional:nacos:rosecloud-common.yaml 拉取
#（optional: 表示 Nacos 不可达或配置缺失时不阻断启动）。
# 敏感值仍以 ${ENV:默认值} 引用服务进程环境变量；本地默认值对齐 docker-compose
#（MySQL: rosecloud / rosecloud123 @ 127.0.0.1:3306/rosecloud）。
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: '${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/rosecloud?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}'
    username: ${MYSQL_USER:rosecloud}
    password: ${MYSQL_PASSWORD:rosecloud123}
