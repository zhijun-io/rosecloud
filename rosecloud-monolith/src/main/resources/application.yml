spring:
  profiles:
    include: monolith
    active: ${SPRING_PROFILES_ACTIVE:dev}
    default: dev
  config:
    import:
      - optional:classpath:rosecloud-common.yaml
  application:
    name: rosecloud-monolith
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false
    discovery:
      enabled: false

server:
  port: 8080

rosecloud:
  cache:
    enabled: true
    type: in-memory

debug: on

logging:
  level:
    io.rosecloud: debug