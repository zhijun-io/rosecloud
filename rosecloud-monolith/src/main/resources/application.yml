spring:
  config:
    import:
      - optional:nacos:rosecloud-common.yaml
  application:
    name: rosecloud-monolith
  profiles:
    active: monolith
  cloud:
    openfeign:
      autoconfiguration:
        jackson:
          enabled: false   # 用 Jackson 2，关闭 OpenFeign 的 Jackson 3 模块（见 auth application.yml 注释）
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      discovery:
        enabled: false

server:
  port: 9160

management:
  endpoints:
    web:
      exposure:
        include: health,info

rosecloud:
  audit:
    enabled: true
  jwt:
    secret: ${ROSECLOUD_JWT_SECRET:}
    issuer: ${ROSECLOUD_JWT_ISSUER:rosecloud}
  tenant:
    enabled: false
  oauth2:
    enabled: false
