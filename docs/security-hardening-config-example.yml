# =============================================================================
# RoseCloud 安全加固配置示例
# -----------------------------------------------------------------------------
# 对应审核报告 docs/security-code-review-2026-07-10.md 中
#   H3 登录/刷新限速与账号锁定
#   M2 JWT aud 受众声明
#   M3 令牌设备绑定（可选）
#   M4 公开路径收敛（/error 已默认移出）
#   M5 租户写护栏严格度
# 的落地配置。仅列出安全相关项，业务配置请按需保留。
# 说明：所有键前缀为 rosecloud.security.*（由 SecurityProperties 绑定）。
# =============================================================================

rosecloud:
  security:

    # ===== JWT 基础 =====
    jwt:
      # 必填：HS512 签名密钥，必须是 Base64 编码的 64 字节（512 bit）随机串。
      # 生成：openssl rand -base64 64
      # 切勿提交真实密钥到仓库；通过环境变量 / 配置中心注入。
      secret: "REPLACE_WITH_BASE64_64BYTE_SECRET"
      issuer: "rosecloud"
      # M2 受众声明：签发写入 aud，校验端拒绝错配受众。
      # 多服务零信任场景下可改为本服务名（如 "rosecloud-auth"），
      # 但所有签发方与校验方必须使用同一 aud，否则令牌会被拒。
      # ⚠️ 这是有意破坏性变更：发版建议滚动重启，避免旧 access token（1h）过渡期内被拒。
      audience: "rosecloud"

    # 令牌有效期（秒）
    access-token-expiration-seconds: 3600      # 1h
    refresh-token-expiration-seconds: 86400    # 24h

    # ===== H3 登录/刷新限速与账号锁定 =====
    # 基于 Redis（StringRedisTemplate）的连续失败计数；达到阈值即锁定账户。
    # 无 Redis 时降级为 no-op 并打印 WARN（启动日志会提示），不提供保护。
    # 接入位置：认证服务（rosecloud-auth）与任何直接校验登录的单体入口。
    brute-force:
      enabled: true
      max-failed-attempts: 5          # 连续失败达到该值即锁定
      lockout-duration-seconds: 900   # 锁定 15 分钟

    # ===== M3 令牌设备绑定（可选，默认关闭）=====
    # 开启后，登录/刷新时把 clientIp + User-Agent 的 SHA-256 指纹写入令牌 fp 声明，
    # 后续每次访问/刷新都比对请求指纹；不同设备重放被盗令牌会被拒。
    # 注意：开启后已签发的旧令牌（无 fp）仍可正常使用，新令牌才带指纹（平滑过渡）。
    # 客户端 IP 易变（NAT / 移动网络）时建议谨慎开启，避免误锁正常用户。
    token-binding:
      enabled: true

    # ===== M5 租户写护栏严格度 =====
    # true  ：无法解析租户状态（无 user API 或查询失败）时，阻断写请求 (403)。
    # false ：（默认）保持原 fail-open 行为，放行写。
    # 仅在服务确实接入了 TenantLookupApi、且希望严格熔断时才建议开启。
    tenant-write-guard:
      fail-closed: false

    # ===== M4 公开路径（默认已移除 /error）=====
    # 以下为框架默认值，列出供参考；可按需覆盖。
    # /actuator/health/** 仍放行给健康检查，但必须置于网络策略后（勿公网暴露）。
    # API_PREFIX 解析为 /api（见 ServiceMetadata）。
    public-paths:
      - "/api/auth/login"
      - "/api/auth/refresh"
      - "/api/auth/logout"
      - "/api/noauth/**"
      - "/api/public/**"
      - "/actuator/health/**"

    # 内部服务间调用共享密钥（L3）。使用常量时间比较校验。
    # 无轮换、无按服务凭证；泄露影响半径需受控，且切勿日志输出。
    internal-token: "REPLACE_WITH_INTERNAL_SHARED_SECRET"
