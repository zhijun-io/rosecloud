version: '3'

# RoseCloud 任务编排。安装 task：brew install go-task/tap/go-task（或见 https://taskfile.dev）
# 快速开始（二选一，一键启动）：task run:monolith | task run:microservice
# 服务以 Docker 容器运行，自动完成构建、初始化、启动全流程。
# 前置：sdkman 已安装配置（.sdkmanrc 锁定 Java 21；首次 `sdk env install` 装 JDK）。Maven 经 `mvnw` 包装器提供（版本见 .mvn/wrapper/）。
# 注：task 内置 shell（gosh）无法 source sdkman，故构建经 `bash -lc` 激活 sdkman 后调用 ./mvnw。

vars:
  MVN: bash ./mvnw "$@"
  COMPOSE: docker compose

tasks:
  default:
    desc: 列出任务
    silent: true
    cmd: task --list

  build:
    desc: 全量构建所有模块（跳过测试）
    cmd: '{{.MVN}} clean install -DskipTests'

  build:monolith:
    desc: 仅构建单体模式所需模块（节省时间）
    cmd: '{{.MVN}} -pl rosecloud-monolith -am install -DskipTests'

  build:microservice:
    desc: 仅构建微服务模式所需模块（节省时间）
    cmd: '{{.MVN}} -pl rosecloud-services/rosecloud-auth,rosecloud-services/rosecloud-system,rosecloud-services/rosecloud-notice,rosecloud-services/rosecloud-gateway -am install -DskipTests'

  test:
    desc: 构建并运行测试
    cmd: '{{.MVN}} clean install'

  clean:
    desc: 清理本地构建产物
    cmd: '{{.MVN}} clean'

  infra:monolith:
    desc: 启动并等待单体基础设施（仅 mysql）就绪
    run: once
    cmd: '{{.COMPOSE}} up -d --wait mysql'

  infra:microservice:
    desc: 启动并等待微服务基础设施（mysql/nacos/redis/rabbitmq）就绪
    run: once
    cmd: '{{.COMPOSE}} up -d --wait mysql nacos redis rabbitmq'

  nacos:publish:
    desc: 发布/更新 Nacos 共享配置 rosecloud-common.yaml（仅微服务需要）
    deps: [infra:microservice]
    cmd: |
      curl -fsS -X POST 'http://127.0.0.1:8848/nacos/v3/admin/cs/config' \
        -H "${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}: ${NACOS_AUTH_IDENTITY_VALUE:-security}" \
        --data-urlencode 'dataId=rosecloud-common.yaml' --data-urlencode 'groupName=DEFAULT_GROUP' \
        --data-urlencode 'namespaceId=public' --data-urlencode 'type=yaml' \
        --data-urlencode "content@deploy/nacos/rosecloud-common.yaml" >/dev/null && echo 'nacos 配置已发布'

  db:load:
    desc: 导入 system/notice 建表与种子数据（单体/微服务通用）
    cmd: |
      for f in rosecloud-services/rosecloud-system/src/main/resources/db/{schema,data}.sql \
               rosecloud-services/rosecloud-notice/src/main/resources/db/{schema,data}.sql; do
        docker exec -i rosecloud-mysql mysql -u"${MYSQL_USER:-rosecloud}" -p"${MYSQL_PASSWORD:-rosecloud123}" "${MYSQL_DATABASE:-rosecloud}" < "$f"
      done && echo 'db 数据已导入'

  init:monolith:
    desc: 单体模式初始化（仅启动 MySQL + 导入建表种子，幂等）
    deps: [infra:monolith, db:load]
    cmd: echo '==> 单体模式基础设施就绪'

  init:microservice:
    desc: 微服务模式初始化（启动全部基础设施 + 发布 Nacos 配置 + 导入建表种子，幂等）
    deps: [infra:microservice, nacos:publish, db:load]
    cmd: echo '==> 微服务模式基础设施就绪'

  run:monolith:
    desc: 单体模式一键启动（自动完成构建 + 初始化 + 运行，:9160，admin/admin123）
    deps: [build:monolith, init:monolith]
    cmd: '{{.COMPOSE}} --profile monolith up --build'

  run:microservice:
    desc: 微服务模式一键启动（自动完成构建 + 初始化 + 运行，网关 :9110，admin/admin123）
    deps: [build:microservice, init:microservice]
    cmd: '{{.COMPOSE}} --profile microservice up --build'

  down:
    desc: 停止全部容器（保留卷）
    cmd: '{{.COMPOSE}} down'

  reset:
    desc: 停止容器并删除卷（清空数据，谨慎使用）
    cmd: '{{.COMPOSE}} down -v'

  logs:
    desc: 跟随全部容器日志
    cmd: '{{.COMPOSE}} logs -f'

  logs:monolith:
    desc: 仅跟随单体模式容器日志
    cmd: '{{.COMPOSE}} --profile monolith logs -f'

  logs:microservice:
    desc: 仅跟随微服务模式容器日志
    cmd: '{{.COMPOSE}} --profile microservice logs -f'

  restart:monolith:
    desc: 重启单体模式服务（保留数据）
    cmd: '{{.COMPOSE}} --profile monolith restart'

  restart:microservice:
    desc: 重启微服务模式服务（保留数据）
    cmd: '{{.COMPOSE}} --profile microservice restart'
