version: '3'

# RoseCloud 任务编排。安装 task：brew install go-task/tap/go-task（或见 https://taskfile.dev）
# 快速开始（二选一，一键启动）：task run:monolith | task run:microservice
# 服务以 Docker 容器运行，自动完成构建、初始化、启动全流程。
vars:
  MVN: bash ./mvnw "$@"
  COMPOSE: docker compose

tasks:
  default:
    desc: 列出任务
    silent: true
    cmd: task --list

  build:
    desc: 全量构建所有模块（跳过测试）
    cmd: '{{.MVN}} clean install -DskipTests'

  build:monolith:
    desc: 仅构建单体模式所需模块（节省时间）
    cmd: '{{.MVN}} -pl rosecloud-monolith -am install -DskipTests'

  build:microservice:
    desc: 仅构建微服务模式所需模块（节省时间）
    cmd: '{{.MVN}} -pl rosecloud-service/rosecloud-auth,rosecloud-service/rosecloud-system,rosecloud-service/rosecloud-notice,rosecloud-service/rosecloud-gateway -am install -DskipTests'

  test:
    desc: 构建并运行测试
    cmd: '{{.MVN}} clean install'

  clean:
    desc: 清理本地构建产物
    cmd: '{{.MVN}} clean'

  infra:monolith:
    desc: 启动并等待单体基础设施（仅 mysql）就绪
    run: once
    cmd: '{{.COMPOSE}} up -d --wait mysql'

  infra:microservice:
    desc: 启动并等待微服务基础设施（mysql/nacos/redis/rabbitmq）就绪
    run: once
    cmd: '{{.COMPOSE}} --profile microservice up -d --wait mysql nacos redis rabbitmq'

  run:monolith:
    desc: 单体模式一键启动（自动完成初始化 → 构建 → 运行，:9160，admin/admin123）
    deps: [ infra:monolith ]  # 仅启动MySQL，SQL由Flyway在服务启动时自动执行
    cmds:
      - task: build:monolith  # 等MySQL就绪后再构建
      - '{{.COMPOSE}} --profile monolith up -d --build'  # 构建成功后启动服务，自动执行数据库迁移

  run:microservice:
    desc: 微服务模式一键启动（自动完成初始化 → 构建 → 运行，网关 :8080，admin/admin123）
    deps: [ infra:microservice ]  # 启动基础设施，SQL由Flyway自动执行
    cmds:
      - task: build:microservice  # 等基础设施就绪后再构建
      - '{{.COMPOSE}} --profile microservice up -d --build'  # 构建成功后启动服务，自动执行数据库迁移

  stop:monolith:
    desc: 停止单体模式运行中的容器（保留容器，下次启动更快）
    cmd: '{{.COMPOSE}} --profile monolith stop'

  stop:microservice:
    desc: 停止微服务模式运行中的容器（保留容器，下次启动更快）
    cmd: '{{.COMPOSE}} --profile microservice stop'

  restart:monolith:
    desc: 重启单体模式服务（保留数据）
    cmd: '{{.COMPOSE}} --profile monolith restart'

  restart:microservice:
    desc: 重启微服务模式服务（保留数据）
    cmd: '{{.COMPOSE}} --profile microservice restart'

  stop:
    desc: 停止全部运行中的容器（保留容器，下次启动更快）
    cmd: '{{.COMPOSE}} stop'

  down:
    desc: 停止并删除全部容器（保留数据卷，数据不会丢失）
    cmd: '{{.COMPOSE}} down'

  reset:
    desc: 停止容器并删除卷（清空数据，谨慎使用）
    cmd: '{{.COMPOSE}} down -v'

  logs:
    desc: 跟随全部容器日志
    cmd: '{{.COMPOSE}} logs -f'

  logs:monolith:
    desc: 仅跟随单体模式容器日志
    cmd: '{{.COMPOSE}} --profile monolith logs -f'

  logs:microservice:
    desc: 仅跟随微服务模式容器日志
    cmd: '{{.COMPOSE}} --profile microservice logs -f'
